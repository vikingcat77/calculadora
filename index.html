<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calculadora JS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="stiloscal.css">
</head>
<body>

    <div class="contenedor-principal">
        <h1 class="titulo-pagina">Calculadora Pro</h1>
        
        <div class="area-trabajo">
            
            <div class="calculadora">
                <input type="text" id="display" readonly value="0">
                <div class="botones">
                    <button class="btn-clear" onclick="limpiar()">C</button>
                    <button class="btn-operator" onclick="operar('/')">/</button>
                    <button onclick="agregar('7')">7</button>
                    <button onclick="agregar('8')">8</button>
                    <button onclick="agregar('9')">9</button>
                    <button class="btn-operator" onclick="operar('*')">*</button>
                    <button onclick="agregar('4')">4</button>
                    <button onclick="agregar('5')">5</button>
                    <button onclick="agregar('6')">6</button>
                    <button class="btn-operator" onclick="operar('-')">-</button>
                    <button onclick="agregar('1')">1</button>
                    <button onclick="agregar('2')">2</button>
                    <button onclick="agregar('3')">3</button>
                    <button class="btn-operator" onclick="operar('+')">+</button>
                    <button onclick="agregar('0')">0</button>
                    <button onclick="agregar('.')">.</button>
                    <button class="btn-equal" onclick="calcular()">=</button>
                </div>
            </div>

            <div class="historial-container">
                <h2><i class="fas fa-history"></i> Historial</h2>
                <ul id="lista-historial" class="bloc-notas">
                    </ul>
                <button class="btn-clear-history" onclick="limpiarHistorial()">Borrar Historial</button>
            </div>
        </div>
    </div>

    <script src="calc.js"></script>
</body>
</html>
